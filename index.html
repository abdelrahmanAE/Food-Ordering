<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bites — Order Food in Egypt</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="app-body">
  <header class="app-header">
    <div class="app-header-inner">
      <a href="index.html" class="logo">Bites<span>.</span></a>
      <div class="header-search">
        <input type="search" id="home-search" placeholder="Search KFC, Gad, shawerma, pizza...">
      </div>
      <div class="nav-actions">
        <a href="orders.html" class="header-icon-btn" title="Orders">📋</a>
        <a href="cart.html" class="header-icon-btn cart-icon-btn" title="Cart">
          🛒
          <span id="cart-count" class="cart-badge">0</span>
        </a>
        <div id="auth-links" class="header-auth">
          <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
        </div>
        <div id="user-menu" class="header-user">
          <span id="user-name"></span>
          <a href="admin.html" id="admin-link" style="display:none">Admin</a>
          <a href="#" id="logout-btn">Logout</a>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section class="hero-compact">
      <h1>Hungry? <em>Order in 2 taps.</em></h1>
      <p>KFC · Gad · Shawerma El Reem · Cook Door & more — like Talabat</p>
    </section>

    <section class="section-tight">
      <div class="section-label">Restaurants near you</div>
      <div id="restaurants-grid" class="restaurants-grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </section>

    <section class="section-tight" id="quick-section">
      <div class="section-label">Quick picks — tap + to add</div>
      <div id="quick-picks" class="quick-picks-scroll"></div>
    </section>
  </main>

  <footer class="footer-mini">Bites · Learning project · EGP prices</footer>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
