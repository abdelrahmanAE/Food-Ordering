<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Bites</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">Bites<span>.</span></a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to place orders and track deliveries</p>

      <div id="error" class="form-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Your password" minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="register.html">Sign up</a>
      </p>

      <p class="auth-footer" style="margin-top:12px;font-size:0.8rem">
        Demo: demo@bites.com / Demo1234!<br>
        Admin: admin@bites.com / Admin123!
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.classList.remove('show');

      try {
        const data = await Api.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        Auth.saveSession(data);
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
