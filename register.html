<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Bites</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">Bites<span>.</span></a>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-card">
      <h1>Create account</h1>
      <p class="subtitle">Join Bites and start ordering</p>

      <div id="error" class="form-error"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" required placeholder="Your name" minlength="2">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Min. 8 characters" minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = 'index.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.classList.remove('show');

      try {
        const data = await Api.post('/auth/register', {
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        Auth.saveSession(data);
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
